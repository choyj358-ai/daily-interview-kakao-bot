spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/daily_interview?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:daily_user}
spring.datasource.password=${DB_PASSWORD:daily_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
